<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Collections - RM Motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        .sidebar {
            width: 280px;
            min-height: 100vh;
            position: fixed;
            background: #111827;
            padding: 30px 20px;
        }

        .main-content {
            margin-left: 280px;
            padding: 30px;
        }

        .nav-link {
            color: #cbd5e1;
            padding: 14px;
            border-radius: 15px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            color: white;
        }

        .car-card {
            background: #1e293b;
            border-radius: 25px;
            overflow: hidden;
            transition: 0.3s;
        }

        .car-card:hover {
            transform: translateY(-8px);
        }

        .car-card img {
            height: 240px;
            object-fit: cover;
        }

        .price {
            color: #00e5ff;
            font-weight: bold;
            font-size: 22px;
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2 class="text-info fw-bold mb-5">
            RM Motors
        </h2>

        <ul class="nav flex-column gap-2">

            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-house me-2"></i>
                    Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="Collections.html" class="nav-link active">
                    <i class="fa-solid fa-car me-2"></i>
                    Collections
                </a>
            </li>

            <li class="nav-item">
                <a href="Analytics.html" class="nav-link">
                    <i class="fa-solid fa-chart-line me-2"></i>
                    Analytics
                </a>
            </li>

            <li class="nav-item">
                <a href="Customers.html" class="nav-link">
                    <i class="fa-solid fa-user-group me-2"></i>
                    Customers
                </a>
            </li>

            <li class="nav-item">
                <a href="Revenue.html" class="nav-link">
                    <i class="fa-solid fa-wallet me-2"></i>
                    Revenue
                </a>
            </li>

            <li class="nav-item">
                <a href="Settings.html" class="nav-link">
                    <i class="fa-solid fa-gear me-2"></i>
                    Settings
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <h1 class="fw-bold mb-4">
            Luxury Collections
        </h1>

        <div class="row g-4">

            <div class="col-lg-4">
                <div class="car-card">
                    <img src="Image/Ferrari.png" class="w-100">
                    <div class="p-4">
                        <h4>Ferrari F8</h4>
                        <p>Italian Luxury Hypercar</p>
                        <div class="price">₹4.5 Cr</div>
                        <button class="btn btn-info w-100 mt-3 rounded-pill">
                            View Car
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="car-card">
                    <img src="Image/Bugatti Chiron.png" class="w-100">
                    <div class="p-4">
                        <h4>Bugatti Chiron</h4>
                        <p>World Fastest Hypercar</p>
                        <div class="price">₹30 Cr</div>
                        <button class="btn btn-info w-100 mt-3 rounded-pill">
                            View Car
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="car-card">
                    <img src="Image/Lamborghini.png" class="w-100">
                    <div class="p-4">
                        <h4>Lamborghini</h4>
                        <p>Powerful Racing Machine</p>
                        <div class="price">₹5.2 Cr</div>
                        <button class="btn btn-info w-100 mt-3 rounded-pill">
                            View Car
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
