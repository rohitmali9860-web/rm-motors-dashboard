<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customers - RM Motors</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            background: #0f172a;
            color: white;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* SIDEBAR */

        .sidebar {
            width: 280px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #111827;
            padding: 30px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo img {
            width: 160px;
        }

        .nav-link {
            color: #cbd5e1;
            padding: 14px 18px;
            border-radius: 14px;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: linear-gradient(90deg, #00e5ff, #0077ff);
            color: #fff !important;
            transform: translateX(6px);
        }

        /* MAIN CONTENT */

        .main-content {
            margin-left: 280px;
            padding: 40px;
        }

        /* TABLE */

        .table-dark {
            --bs-table-bg: #111827;
            border-radius: 20px;
            overflow: hidden;
        }

        .table th,
        .table td {
            padding: 18px;
        }

        @media(max-width:991px) {

            .sidebar {
                width: 100%;
                min-height: auto;
                position: relative;
            }

            .main-content {
                margin-left: 0;
            }

        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo text-center mb-5">
            <img src="Image/Logo.png" alt="">
        </div>

        <ul class="nav flex-column gap-2">

            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-house me-2"></i>
                    Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="Collections.html" class="nav-link">
                    <i class="fa-solid fa-car me-2"></i>
                    Collections
                </a>
            </li>

            <li class="nav-item">
                <a href="Analytics.html" class="nav-link">
                    <i class="fa-solid fa-chart-line me-2"></i>
                    Analytics
                </a>
            </li>

            <li class="nav-item">
                <a href="Customers.html" class="nav-link active">
                    <i class="fa-solid fa-user-group me-2"></i>
                    Customers
                </a>
            </li>

            <li class="nav-item">
                <a href="Revenue.html" class="nav-link">
                    <i class="fa-solid fa-wallet me-2"></i>
                    Revenue
                </a>
            </li>

            <li class="nav-item">
                <a href="Settings.html" class="nav-link">
                    <i class="fa-solid fa-gear me-2"></i>
                    Settings
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <h1 class="fw-bold mb-4">
            Premium Customers
        </h1>

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Country</th>
                        <th>Purchased Car</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>Rohit Mali</td>
                        <td>India</td>
                        <td>Ferrari F8</td>
                        <td>
                            <span class="badge bg-success">
                                Active
                            </span>
                        </td>
                    </tr>

                    <tr>
                        <td>Vedant Shah</td>
                        <td>Dubai</td>
                        <td>Bugatti Chiron</td>
                        <td>
                            <span class="badge bg-warning text-dark">
                                Pending
                            </span>
                        </td>
                    </tr>

                    <tr>
                        <td>Aditya More</td>
                        <td>USA</td>
                        <td>Lamborghini Aventador</td>
                        <td>
                            <span class="badge bg-info">
                                VIP
                            </span>
                        </td>
                    </tr>

                    <tr>
                        <td>Karan Patel</td>
                        <td>Canada</td>
                        <td>McLaren P1</td>
                        <td>
                            <span class="badge bg-success">
                                Delivered
                            </span>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
